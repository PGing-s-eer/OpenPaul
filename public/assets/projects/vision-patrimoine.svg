    <circle cx="100" cy="300" r="1"/><circle cx="200" cy="300" r="1"/><circle cx="300" cy="300" r="1"/>
    <circle cx="500" cy="300" r="1"/><circle cx="600" cy="300" r="1"/><circle cx="700" cy="300" r="1"/>
    <circle cx="100" cy="400" r="1"/><circle cx="200" cy="400" r="1"/><circle cx="300" cy="400" r="1"/>
    <circle cx="500" cy="400" r="1"/><circle cx="600" cy="400" r="1"/><circle cx="700" cy="400" r="1"/>
