      <stop offset="0%" stop-color="#0f1814" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050807" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#vpgrad3)"/>
  
  <!-- Grille de points en arrière-plan -->
  <g opacity="0.15" fill="#5eead4">
