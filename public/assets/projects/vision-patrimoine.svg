    <circle cx="500" cy="100" r="1"/><circle cx="600" cy="100" r="1"/><circle cx="700" cy="100" r="1"/>
    <circle cx="100" cy="200" r="1"/><circle cx="200" cy="200" r="1"/><circle cx="300" cy="200" r="1"/>
