  <!-- Code en arrière-plan (filigrane) -->
  <g opacity="0.06" font-family="'Courier New', monospace" font-size="9" fill="#5eead4">
    <text x="40" y="120">df = spark.read.parquet('hdfs://reviews/*.parquet')</text>
    <text x="40" y="140">features = ['RFM_score', 'LOR', 'volume_12m']</text>
    <text x="40" y="160">model = ARIMA(order=(2,1,2)).fit(ts_data)</text>
    <text x="40" y="180">cnn.add(Conv2D(64, (3,3), activation='relu'))</text>
    <text x="450" y="380">accuracy: 0.94 | precision: 0.91</text>
    <text x="450" y="400">RMSE: 127.4 | MAPE: 3.2%</text>
    <text x="450" y="420">val_loss: 0.041 | f1_score: 0.92</text>
  </g>
  
  
