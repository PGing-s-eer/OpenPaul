<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="ddbg3" cx="40%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0a1612" stop-opacity="1"/>
      <stop offset="100%" stop-color="#03060a" stop-opacity="1"/>
    </radialGradient>
    
    <radialGradient id="geminiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="webNodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="webFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5eead4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="500" fill="url(#ddbg3)"/>
  
  <!-- ARRIÈRE-PLAN : prompt + résultats web en filigrane -->
  <g opacity="0.06" font-family="'Courier New', monospace" font-size="9" fill="#5eead4">
    <text x="40" y="120">prompt: "find decarbonization grants for industrial site in Lyon"</text>
    <text x="40" y="140">scope: local · national · european · technical guidance</text>
    <text x="40" y="160">→ search: ADEME Auvergne-Rhône-Alpes, Métropole de Lyon...</text>
    <text x="40" y="180">→ search: France 2030, programme CEE secteur industrie...</text>
    <text x="40" y="200">→ search: EU Innovation Fund, Horizon Europe LIFE...</text>
    <text x="450" y="395">found: 17 sources · cross-checked</text>
    <text x="450" y="410">eligibility: 4 grants applicable</text>
    <text x="450" y="425">report: structured with citations</text>
  </g>
  
  <!-- WORLD GRID en arrière-plan (suggestion de "chercher partout") -->
  <g opacity="0.08" stroke="#5eead4" fill="none" stroke-width="0.5">
    <ellipse cx="600" cy="250" rx="120" ry="120"/>
    <ellipse cx="600" cy="250" rx="120" ry="50"/>
    <ellipse cx="600" cy="250" rx="120" ry="90"/>
    <line x1="480" y1="250" x2="720" y2="250"/>
    <line x1="600" y1="130" x2="600" y2="370"/>
  </g>
  
  <!-- USER QUERY (gauche) -->
  <g transform="translate(50, 230)">
    <ellipse cx="55" cy="40" rx="60" ry="40" fill="url(#webNodeGlow)"/>
    <rect x="15" y="15" width="80" height="50" rx="3" fill="#0d1814" stroke="#5eead4" stroke-width="1.3"/>
    <text x="25" y="32" font-family="'Courier New', monospace" font-size="7" fill="#5eead4" opacity="0.9">&gt; query</text>
    <line x1="25" y1="38" x2="80" y2="38" stroke="#5eead4" stroke-width="0.5" opacity="0.5"/>
    <line x1="25" y1="44" x2="75" y2="44" stroke="#5eead4" stroke-width="0.5" opacity="0.5"/>
    <line x1="25" y1="50" x2="78" y2="50" stroke="#5eead4" stroke-width="0.5" opacity="0.5"/>
    <rect x="25" y="55" width="6" height="6" fill="#5eead4" opacity="0.7"/>
  </g>
  <text x="105" y="335" font-family="'Courier New', monospace" font-size="8" fill="#5eead4" text-anchor="middle" opacity="0.65" letter-spacing="2">USER · TEAMS</text>
  
  <!-- Connexion query → Gemini -->
  <line x1="160" y1="270" x2="245" y2="270" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="3,4" opacity="0.5"/>
  <polygon points="245,270 239,266 239,274" fill="#5eead4" opacity="0.5"/>
  
  <!-- GEMINI ENTERPRISE AGENT (centre, en valeur, single agent) -->
  <g transform="translate(255, 195)">
    <ellipse cx="75" cy="75" rx="100" ry="85" fill="url(#geminiGlow)"/>
    
    <!-- Cercle principal Gemini -->
    <circle cx="75" cy="75" r="60" fill="#0d1814" stroke="#fb923c" stroke-width="2"/>
    <circle cx="75" cy="75" r="60" fill="none" stroke="#fb923c" stroke-width="0.8" opacity="0.4" transform="scale(1.06) translate(-4.5, -4.5)"/>
    <circle cx="75" cy="75" r="60" fill="none" stroke="#fb923c" stroke-width="0.4" opacity="0.25" transform="scale(1.12) translate(-9, -9)"/>
    
    <!-- "Gemini star" stylisée au centre (4-pointed star, signature Gemini) -->
    <g opacity="0.95">
      <path d="M 75 45 
               Q 80 70 105 75 
               Q 80 80 75 105 
               Q 70 80 45 75 
               Q 70 70 75 45 Z" 
            fill="#fb923c" opacity="0.85"/>
      <path d="M 75 45 
               Q 80 70 105 75 
               Q 80 80 75 105 
               Q 70 80 45 75 
               Q 70 70 75 45 Z" 
            fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
    </g>
    
    <!-- Petits points pulsants autour -->
    <circle cx="75" cy="20" r="2" fill="#fb923c" opacity="0.7"/>
    <circle cx="130" cy="75" r="2" fill="#fb923c" opacity="0.7"/>
    <circle cx="75" cy="130" r="2" fill="#fb923c" opacity="0.7"/>
    <circle cx="20" cy="75" r="2" fill="#fb923c" opacity="0.7"/>
    
    <text x="75" y="148" font-family="'Courier New', monospace" font-size="9" fill="#fb923c" text-anchor="middle" opacity="0.95" letter-spacing="2" font-weight="700">GEMINI ENTERPRISE</text>
    <text x="75" y="160" font-family="'Courier New', monospace" font-size="7" fill="#fb923c" text-anchor="middle" opacity="0.6" letter-spacing="2">single agent · web-empowered</text>
  </g>
  
  <!-- Lignes de recherche web qui rayonnent vers la droite -->
  <g opacity="0.6">
    <path d="M 405 245 Q 470 220, 540 180" stroke="url(#webFlow)" stroke-width="2" fill="none"/>
    <path d="M 405 270 Q 470 270, 540 270" stroke="url(#webFlow)" stroke-width="2" fill="none"/>
    <path d="M 405 295 Q 470 320, 540 360" stroke="url(#webFlow)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Particules sur les lignes -->
  <circle cx="450" cy="232" r="2" fill="#5eead4" opacity="0.8"/>
  <circle cx="500" cy="200" r="2.5" fill="#5eead4" opacity="0.8"/>
  <circle cx="450" cy="270" r="2" fill="#5eead4" opacity="0.8"/>
  <circle cx="500" cy="270" r="2.5" fill="#5eead4" opacity="0.8"/>
  <circle cx="450" cy="308" r="2" fill="#5eead4" opacity="0.8"/>
  <circle cx="500" cy="340" r="2.5" fill="#5eead4" opacity="0.8"/>
  
  <!-- 3 NIVEAUX DE SOURCES WEB (le côté "scope élargi" : local / national / européen) -->
  <!-- Niveau 1 : LOCAL -->
  <g transform="translate(540, 145)">
    <rect x="0" y="0" width="100" height="50" rx="3" fill="#0d1814" stroke="#5eead4" stroke-width="1" opacity="0.85"/>
    <!-- Pin -->
    <circle cx="18" cy="22" r="4" fill="none" stroke="#5eead4" stroke-width="0.8"/>
    <path d="M 14 25 L 18 33 L 22 25" stroke="#5eead4" stroke-width="0.8" fill="none"/>
    <circle cx="18" cy="22" r="1.5" fill="#5eead4"/>
    <text x="35" y="20" font-family="'Courier New', monospace" font-size="9" fill="#5eead4" opacity="0.95" letter-spacing="1">LOCAL</text>
    <text x="35" y="32" font-family="'Courier New', monospace" font-size="6" fill="#5eead4" opacity="0.6">Mairies · ADEME régionale</text>
    <text x="35" y="42" font-family="'Courier New', monospace" font-size="6" fill="#5eead4" opacity="0.6">Métropole · agglos</text>
  </g>
  
  <!-- Niveau 2 : NATIONAL -->
  <g transform="translate(540, 245)">
    <rect x="0" y="0" width="100" height="50" rx="3" fill="#0d1814" stroke="#5eead4" stroke-width="1" opacity="0.85"/>
    <!-- Drapeau / monument stylisé -->
    <line x1="14" y1="14" x2="14" y2="32" stroke="#5eead4" stroke-width="0.8"/>
    <path d="M 14 14 L 24 17 L 14 22 Z" fill="#5eead4" opacity="0.7"/>
    <line x1="11" y1="32" x2="22" y2="32" stroke="#5eead4" stroke-width="0.8"/>
    <text x="35" y="20" font-family="'Courier New', monospace" font-size="9" fill="#5eead4" opacity="0.95" letter-spacing="1">NATIONAL</text>
    <text x="35" y="32" font-family="'Courier New', monospace" font-size="6" fill="#5eead4" opacity="0.6">France 2030 · CEE</text>
    <text x="35" y="42" font-family="'Courier New', monospace" font-size="6" fill="#5eead4" opacity="0.6">Bpifrance · ministères</text>
  </g>
  
  <!-- Niveau 3 : EUROPEAN -->
  <g transform="translate(540, 345)">
    <rect x="0" y="0" width="100" height="50" rx="3" fill="#0d1814" stroke="#5eead4" stroke-width="1" opacity="0.85"/>
    <!-- Étoiles UE stylisées -->
    <g opacity="0.85">
      <circle cx="14" cy="20" r="1.2" fill="#5eead4"/>
      <circle cx="20" cy="16" r="1.2" fill="#5eead4"/>
      <circle cx="26" cy="20" r="1.2" fill="#5eead4"/>
      <circle cx="14" cy="28" r="1.2" fill="#5eead4"/>
      <circle cx="20" cy="32" r="1.2" fill="#5eead4"/>
      <circle cx="26" cy="28" r="1.2" fill="#5eead4"/>
    </g>
    <text x="40" y="20" font-family="'Courier New', monospace" font-size="9" fill="#5eead4" opacity="0.95" letter-spacing="1">EUROPEAN</text>
    <text x="40" y="32" font-family="'Courier New', monospace" font-size="6" fill="#5eead4" opacity="0.6">Innovation Fund</text>
    <text x="40" y="42" font-family="'Courier New', monospace" font-size="6" fill="#5eead4" opacity="0.6">Horizon · LIFE</text>
  </g>
  
  <!-- Lignes retour vers REPORT -->
  <g opacity="0.45" stroke="#fb923c" stroke-dasharray="2,3">
    <line x1="640" y1="170" x2="715" y2="265"/>
    <line x1="640" y1="270" x2="715" y2="270"/>
    <line x1="640" y1="370" x2="715" y2="275"/>
  </g>
  
  <!-- OUTPUT REPORT -->
  <g transform="translate(710, 240)">
    <ellipse cx="35" cy="35" rx="50" ry="40" fill="url(#geminiGlow)"/>
    <rect x="5" y="5" width="60" height="60" rx="3" fill="#0d1814" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="13" y1="15" x2="58" y2="15" stroke="#fb923c" stroke-width="0.5" opacity="0.7"/>
    <line x1="13" y1="20" x2="55" y2="20" stroke="#fb923c" stroke-width="0.5" opacity="0.7"/>
    <line x1="13" y1="25" x2="50" y2="25" stroke="#fb923c" stroke-width="0.5" opacity="0.7"/>
    <rect x="13" y="35" width="6" height="20" fill="#fb923c" opacity="0.7"/>
    <rect x="22" y="40" width="6" height="15" fill="#fb923c" opacity="0.6"/>
    <rect x="31" y="32" width="6" height="23" fill="#fb923c" opacity="0.85"/>
    <rect x="40" y="38" width="6" height="17" fill="#fb923c" opacity="0.6"/>
    <rect x="49" y="42" width="6" height="13" fill="#fb923c" opacity="0.5"/>
    <line x1="13" y1="55" x2="60" y2="55" stroke="#fb923c" stroke-width="0.5" opacity="0.5"/>
  </g>
  <text x="745" y="305" font-family="'Courier New', monospace" font-size="9" fill="#fb923c" text-anchor="middle" opacity="0.85" letter-spacing="2">REPORT</text>
  
  <!-- TITLE -->
  <text x="50" y="50" font-family="'Courier New', monospace" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="1">DIADEME</text>
  <text x="50" y="72" font-family="'Courier New', monospace" font-size="10" fill="#5eead4" letter-spacing="2" opacity="0.75">GENAI ASSISTANT · DECARBONIZATION GRANTS WATCH</text>
  
  <text x="745" y="50" font-family="'Courier New', monospace" font-size="9" fill="#fb923c" text-anchor="end" opacity="0.65" letter-spacing="2">ENGIE · AI LAB</text>
  <text x="745" y="68" font-family="'Courier New', monospace" font-size="8" fill="#5eead4" text-anchor="end" opacity="0.5" letter-spacing="1">2026</text>
  
  <line x1="50" y1="430" x2="750" y2="430" stroke="#5eead4" stroke-width="0.5" opacity="0.2"/>
  <text x="400" y="455" font-family="'Courier New', monospace" font-size="9" fill="#5eead4" text-anchor="middle" opacity="0.55" letter-spacing="3">GEMINI ENTERPRISE · WEB SEARCH · PROMPT ENGINEERING · LOW-CODE BENCHMARK</text>
</svg>
